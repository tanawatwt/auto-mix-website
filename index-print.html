  <style>
    /* ===== Print-ready overrides ===== */
    html, body {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    @page {
      size: A4 portrait;
      margin: 10mm;
    }

    @media print {
      html, body {
        background: var(--bg) !important;
        min-height: 0 !important;
      }

      /* Force all backgrounds / colors to render */
      *, *::before, *::after {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Hide anything interactive or floating that has no meaning on paper */
      .top-bar,
      .site-header,
      .floating,
      .floating-bar,
      .fab,
      .tweaks-panel,
      .twk-panel,
      .twk-fab,
      .back-to-top,
      [data-edit-mode-ui],
      .site-header + *:empty {
        display: none !important;
      }

      /* Drop sticky/fixed so nothing overlays */
      .site-header,
      .top-bar,
      [style*="position: fixed"],
      [style*="position:fixed"],
      [style*="position: sticky"],
      [style*="position:sticky"] {
        position: static !important;
      }

      /* Kill animations, transitions, hover effects */
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }

      /* Keep large visual blocks together when possible */
      section, .sec, .hero, .card, .service-card, .testimonial,
      .blog-featured, .gallery-item, .value-card, .team-card,
      .cta-banner, .brand-card, .stat, .stat-card {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      /* Images never split */
      img, svg, picture {
        break-inside: avoid;
        page-break-inside: avoid;
        max-width: 100% !important;
      }

      /* Avoid orphan headings */
      h1, h2, h3, h4 {
        break-after: avoid;
        page-break-after: avoid;
      }

      /* Make hero hold its height on paper */
      .hero {
        min-height: 0 !important;
      }

      /* Slight density tighten for print */
      .sec {
        padding-top: 48px !important;
        padding-bottom: 48px !important;
      }

      /* Footer should not float into weirdness */
      .site-footer {
        break-before: auto;
      }

      /* Ensure any background-image heroes still print */
      [style*="background"] {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
    }

    /* Also apply on-screen so the preview matches print layout */
    body {
      background: var(--bg);
    }
    .floating, .floating-bar, .twk-fab, .twk-panel, .back-to-top {
      display: none !important;
    }
  </style>

  <script type="text/babel" data-presets="env,react">
    // Auto-print: wait for fonts, React render, images, then print.
    (async () => {
      const waitForReactRender = () => new Promise((resolve) => {
        const start = Date.now();
        const check = () => {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) return resolve();
          if (Date.now() - start > 8000) return resolve();
          requestAnimationFrame(check);
        };
        check();
      });

      const waitForImages = () => {
        const imgs = Array.from(document.images || []);
        return Promise.all(imgs.map((img) => {
          if (img.complete && img.naturalWidth > 0) return Promise.resolve();
          return new Promise((res) => {
            const done = () => res();
            img.addEventListener('load', done, { once: true });
            img.addEventListener('error', done, { once: true });
            setTimeout(done, 6000);
          });
        }));
      };

      await waitForReactRender();
      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch (e) {}
      }
      await waitForImages();
      await new Promise((r) => setTimeout(r, 800));
      window.print();
    })();
  </script>
